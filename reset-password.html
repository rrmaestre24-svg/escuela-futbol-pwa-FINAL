<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MY CLUB — Restablecer contraseña</title>
  <!-- Config Supabase: define window.SUPA_URL / SUPA_ANON. Debe cargar primero. -->
  <script src="js/supabase-config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(160deg, #0f172a 0%, #1e3a5f 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px;
    }
    .card {
      width: 100%; max-width: 420px;
      background: rgba(255,255,255,0.06); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4); padding: 28px 24px;
    }
    .logo-img {
      width: 68px; height: 68px; margin: 0 auto 12px; display: block;
      border-radius: 18px; object-fit: cover; box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    }
    h1 { color: #fff; font-size: 20px; text-align: center; font-weight: 800; }
    .subtitle { color: #cbd5e1; font-size: 14px; text-align: center; margin-top: 4px; }
    .account-box {
      margin: 14px 0 20px; padding: 10px 12px; border-radius: 12px;
      background: rgba(13,148,136,0.12); border: 1px solid rgba(13,148,136,0.35);
      text-align: center;
    }
    .account-box .lbl { color: #94a3b8; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }
    .account-box .val { color: #5eead4; font-size: 14px; font-weight: 700; word-break: break-all; margin-top: 2px; }
    .account-box .club { color: #cbd5e1; font-size: 12px; margin-top: 2px; }
    label { display: block; color: #cbd5e1; font-size: 12px; font-weight: 500; margin-bottom: 5px; }
    .pw-wrap { position: relative; margin-bottom: 14px; }
    input {
      width: 100%; padding: 12px 44px 12px 14px; border-radius: 12px; font-size: 15px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; outline: none;
    }
    input:focus { border-color: #14b8a6; }
    input::placeholder { color: #94a3b8; }
    .eye {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      width: 32px; height: 32px; border: none; background: transparent; cursor: pointer;
      color: #94a3b8; display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .eye:hover { color: #cbd5e1; }
    button.submit {
      width: 100%; padding: 13px; border: none; border-radius: 12px; cursor: pointer;
      background: linear-gradient(90deg, #0d9488, #0891b2); color: #fff; font-weight: 700; font-size: 15px;
      transition: opacity .2s;
    }
    button.submit:disabled { opacity: .5; cursor: not-allowed; }
    .msg { font-size: 14px; margin-bottom: 12px; }
    .msg.error { color: #fca5a5; }
    .msg.success { color: #86efac; }
    .hidden { display: none; }
    .link-btn {
      display: inline-block; margin-top: 8px; padding: 10px 24px; border-radius: 12px;
      background: #0d9488; color: #fff; text-decoration: none; font-weight: 700; font-size: 14px;
    }
    .center { text-align: center; padding: 12px 0; }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo-img" src="assets/icons/icon-192x192.png" alt="MY CLUB"
         onerror="this.style.display='none'">
    <h1>Restablecer contraseña</h1>
    <p class="subtitle">Ingresa tu nueva contraseña</p>

    <!-- Error de token / enlace -->
    <div id="tokenError" class="hidden center">
      <p class="msg error" style="margin-bottom:16px;"></p>
      <a href="login.html" class="link-btn">Volver al inicio</a>
    </div>

    <!-- Formulario de nueva contraseña -->
    <form id="resetForm" class="hidden">
      <!-- Cuenta a la que se le cambia la contraseña -->
      <div id="accountBox" class="account-box hidden">
        <div class="lbl">Cuenta</div>
        <div class="val" id="accountEmail"></div>
        <div class="club" id="accountClub"></div>
      </div>

      <label>Nueva contraseña</label>
      <div class="pw-wrap">
        <input id="newPassword" type="password" minlength="8" required autocomplete="new-password" placeholder="Mínimo 8 caracteres">
        <button type="button" class="eye" data-target="newPassword" aria-label="Ver contraseña">👁</button>
      </div>

      <label>Confirmar contraseña</label>
      <div class="pw-wrap">
        <input id="confirmPassword" type="password" minlength="8" required autocomplete="new-password" placeholder="Repite la contraseña">
        <button type="button" class="eye" data-target="confirmPassword" aria-label="Ver contraseña">👁</button>
      </div>

      <p id="formMessage" class="msg hidden"></p>
      <button class="submit" id="submitBtn" type="submit">Guardar contraseña nueva</button>
    </form>
  </div>

  <script>
    (function () {
      var SUPA_URL = window.SUPA_URL;
      var SUPA_ANON = window.SUPA_ANON;

      var tokenError = document.getElementById('tokenError');
      var resetForm = document.getElementById('resetForm');
      var formMessage = document.getElementById('formMessage');
      var submitBtn = document.getElementById('submitBtn');

      function showTokenError(msg) {
        tokenError.querySelector('p').textContent = msg;
        tokenError.classList.remove('hidden');
        resetForm.classList.add('hidden');
      }
      function showFormMessage(msg, type) {
        formMessage.textContent = msg;
        formMessage.className = 'msg ' + (type === 'error' ? 'error' : 'success');
        formMessage.classList.remove('hidden');
      }

      // Decodifica el payload de un JWT (sin verificar firma; solo para leer email/club).
      function decodeJwt(token) {
        try {
          var p = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
          while (p.length % 4) p += '=';
          return JSON.parse(decodeURIComponent(escape(atob(p))));
        } catch (e) { return null; }
      }

      // Botones "ver contraseña" (👁)
      var eyes = document.querySelectorAll('.eye');
      for (var i = 0; i < eyes.length; i++) {
        eyes[i].addEventListener('click', function () {
          var inp = document.getElementById(this.getAttribute('data-target'));
          if (!inp) return;
          if (inp.type === 'password') { inp.type = 'text'; this.textContent = '🙈'; }
          else { inp.type = 'password'; this.textContent = '👁'; }
        });
      }

      // 1) Leer el token de recuperación del #hash (y respaldo de la query).
      var hash = new URLSearchParams((window.location.hash || '').replace(/^#/, ''));
      var qp = new URLSearchParams(window.location.search || '');
      var accessToken = hash.get('access_token') || qp.get('access_token');
      var type = hash.get('type') || qp.get('type');
      var hashError = hash.get('error_description') || hash.get('error') || qp.get('error_description') || qp.get('error');

      if (!SUPA_URL || !SUPA_ANON) {
        showTokenError('Error de configuración. Abre esta página desde el enlace del correo.');
        return;
      }
      if (hashError) {
        // URLSearchParams ya decodifica; NO volver a decodeURIComponent (podría lanzar URIError).
        showTokenError('El enlace expiró o no es válido (' + hashError + '). Solicita uno nuevo desde "¿Olvidaste tu contraseña?".');
        return;
      }
      if (!accessToken || type !== 'recovery') {
        showTokenError('Enlace inválido. Abrí el enlace en tu navegador (Chrome/Safari), no dentro del correo, y desde el mismo dispositivo.');
        return;
      }

      // Token válido → mostrar el formulario y limpiar el hash.
      try { history.replaceState(null, '', window.location.pathname); } catch (e) {}
      resetForm.classList.remove('hidden');

      // Mostrar de qué cuenta/club es la contraseña (desde el JWT).
      var claims = decodeJwt(accessToken);
      if (claims && claims.email) {
        document.getElementById('accountEmail').textContent = claims.email;
        var club = claims.app_metadata && claims.app_metadata.club_id;
        var box = document.getElementById('accountBox');
        box.classList.remove('hidden');
        // Intentar mostrar el NOMBRE del club (best-effort, con el token de recovery).
        if (club) {
          document.getElementById('accountClub').textContent = 'Club: ' + club;
          fetch(SUPA_URL + '/rest/v1/clubs?id=eq.' + encodeURIComponent(club) + '&select=name', {
            headers: { apikey: SUPA_ANON, Authorization: 'Bearer ' + accessToken }
          }).then(function (r) { return r.ok ? r.json() : []; })
            .then(function (rows) {
              if (rows && rows[0] && rows[0].name) {
                document.getElementById('accountClub').textContent = 'Club: ' + rows[0].name;
              }
            }).catch(function () {});
        }
      }

      // 2) Guardar la nueva contraseña usando el token de recovery.
      resetForm.addEventListener('submit', async function (e) {
        e.preventDefault();
        var pass = document.getElementById('newPassword').value;
        var confirm = document.getElementById('confirmPassword').value;

        if (pass.length < 8) { showFormMessage('❌ La contraseña debe tener al menos 8 caracteres', 'error'); return; }
        if (pass !== confirm) { showFormMessage('❌ Las contraseñas no coinciden', 'error'); return; }

        submitBtn.disabled = true;
        submitBtn.textContent = '⏳ Guardando...';
        try {
          var res = await fetch(SUPA_URL + '/auth/v1/user', {
            method: 'PUT',
            headers: {
              'apikey': SUPA_ANON,
              'Authorization': 'Bearer ' + accessToken,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ password: pass })
          });
          var data = await res.json().catch(function () { return {}; });
          if (!res.ok) {
            throw new Error(data && (data.msg || data.error_description || data.message) || ('HTTP ' + res.status));
          }
          showFormMessage('✅ ¡Contraseña actualizada! Redirigiendo al inicio de sesión...', 'success');
          submitBtn.textContent = '✅ Listo';
          setTimeout(function () { window.location.href = 'login.html'; }, 1800);
        } catch (err) {
          console.error('[reset-password] error:', err);
          var m = (err && err.message) || 'Error al actualizar la contraseña';
          if (/expired|invalid|401|jwt/i.test(m)) {
            showFormMessage('❌ El enlace expiró. Vuelve a "¿Olvidaste tu contraseña?" y solicita uno nuevo.', 'error');
          } else {
            showFormMessage('❌ ' + m, 'error');
          }
          submitBtn.disabled = false;
          submitBtn.textContent = 'Guardar contraseña nueva';
        }
      });
    })();
  </script>
</body>
</html>
