<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MY CLUB — Restablecer contraseña</title>
  <!-- Config Supabase: define window.SUPA_URL / SUPA_ANON. Debe cargar primero. -->
  <script src="js/supabase-config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(160deg, #0f172a 0%, #1e3a5f 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px;
    }
    .card {
      width: 100%; max-width: 420px;
      background: rgba(255,255,255,0.06); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4); padding: 28px 24px;
    }
    .logo {
      width: 60px; height: 60px; margin: 0 auto 12px; border-radius: 18px;
      background: #0d9488; color: #fff; font-weight: 900; font-size: 22px;
      display: flex; align-items: center; justify-content: center;
    }
    h1 { color: #fff; font-size: 20px; text-align: center; font-weight: 800; }
    .subtitle { color: #cbd5e1; font-size: 14px; text-align: center; margin-top: 4px; margin-bottom: 22px; }
    label { display: block; color: #cbd5e1; font-size: 12px; font-weight: 500; margin-bottom: 5px; }
    input {
      width: 100%; padding: 12px 14px; border-radius: 12px; font-size: 15px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; outline: none; margin-bottom: 14px;
    }
    input:focus { border-color: #14b8a6; }
    input::placeholder { color: #94a3b8; }
    button {
      width: 100%; padding: 13px; border: none; border-radius: 12px; cursor: pointer;
      background: linear-gradient(90deg, #0d9488, #0891b2); color: #fff; font-weight: 700; font-size: 15px;
      transition: opacity .2s;
    }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .msg { font-size: 14px; margin-bottom: 12px; }
    .msg.error { color: #fca5a5; }
    .msg.success { color: #86efac; }
    .hidden { display: none; }
    .link-btn {
      display: inline-block; margin-top: 8px; padding: 10px 24px; border-radius: 12px;
      background: #0d9488; color: #fff; text-decoration: none; font-weight: 700; font-size: 14px;
    }
    .center { text-align: center; padding: 12px 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">MC</div>
    <h1>Restablecer contraseña</h1>
    <p class="subtitle" id="subtitle">Ingresa tu nueva contraseña</p>

    <!-- Error de token / enlace -->
    <div id="tokenError" class="hidden center">
      <p class="msg error" style="margin-bottom:16px;"></p>
      <a href="login.html" class="link-btn">Volver al inicio</a>
    </div>

    <!-- Formulario de nueva contraseña -->
    <form id="resetForm" class="hidden">
      <label>Nueva contraseña</label>
      <input id="newPassword" type="password" minlength="6" required autocomplete="new-password" placeholder="Mínimo 6 caracteres">
      <label>Confirmar contraseña</label>
      <input id="confirmPassword" type="password" minlength="6" required autocomplete="new-password" placeholder="Repite la contraseña">
      <p id="formMessage" class="msg hidden"></p>
      <button id="submitBtn" type="submit">Guardar contraseña nueva</button>
    </form>
  </div>

  <script>
    (function () {
      var SUPA_URL = window.SUPA_URL;
      var SUPA_ANON = window.SUPA_ANON;

      var tokenError = document.getElementById('tokenError');
      var resetForm = document.getElementById('resetForm');
      var formMessage = document.getElementById('formMessage');
      var submitBtn = document.getElementById('submitBtn');

      function showTokenError(msg) {
        tokenError.querySelector('p').textContent = msg;
        tokenError.classList.remove('hidden');
        resetForm.classList.add('hidden');
      }
      function showFormMessage(msg, type) {
        formMessage.textContent = msg;
        formMessage.className = 'msg ' + (type === 'error' ? 'error' : 'success');
        formMessage.classList.remove('hidden');
      }

      // 1) Leer el token de recuperación del hash de la URL.
      //    Supabase manda: #access_token=...&refresh_token=...&type=recovery&...
      var hash = new URLSearchParams((window.location.hash || '').replace(/^#/, ''));
      var accessToken = hash.get('access_token');
      var type = hash.get('type');
      var hashError = hash.get('error_description') || hash.get('error');

      if (!SUPA_URL || !SUPA_ANON) {
        showTokenError('Error de configuración. Abre esta página desde el enlace del correo.');
        return;
      }
      if (hashError) {
        // URLSearchParams ya decodifica; NO volver a decodeURIComponent (podría lanzar URIError).
        showTokenError('El enlace expiró o no es válido (' + hashError + '). Solicita uno nuevo desde "¿Olvidaste tu contraseña?".');
        return;
      }
      if (!accessToken || type !== 'recovery') {
        showTokenError('Enlace inválido. Abre esta página desde el botón del correo de recuperación.');
        return;
      }

      // Token válido → mostrar el formulario y limpiar el hash (no dejar el token a la vista).
      try { history.replaceState(null, '', window.location.pathname); } catch (e) {}
      resetForm.classList.remove('hidden');

      // 2) Guardar la nueva contraseña usando el token de recovery.
      resetForm.addEventListener('submit', async function (e) {
        e.preventDefault();
        var pass = document.getElementById('newPassword').value;
        var confirm = document.getElementById('confirmPassword').value;

        if (pass.length < 6) { showFormMessage('❌ La contraseña debe tener al menos 6 caracteres', 'error'); return; }
        if (pass !== confirm) { showFormMessage('❌ Las contraseñas no coinciden', 'error'); return; }

        submitBtn.disabled = true;
        submitBtn.textContent = '⏳ Guardando...';
        try {
          // PUT /auth/v1/user con el token de recovery → actualiza la contraseña.
          var res = await fetch(SUPA_URL + '/auth/v1/user', {
            method: 'PUT',
            headers: {
              'apikey': SUPA_ANON,
              'Authorization': 'Bearer ' + accessToken,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ password: pass })
          });
          var data = await res.json().catch(function () { return {}; });
          if (!res.ok) {
            throw new Error(data && (data.msg || data.error_description || data.message) || ('HTTP ' + res.status));
          }
          showFormMessage('✅ ¡Contraseña actualizada! Redirigiendo al inicio de sesión...', 'success');
          submitBtn.textContent = '✅ Listo';
          setTimeout(function () { window.location.href = 'login.html'; }, 1800);
        } catch (err) {
          console.error('[reset-password] error:', err);
          var m = (err && err.message) || 'Error al actualizar la contraseña';
          if (/expired|invalid|401|jwt/i.test(m)) {
            showFormMessage('❌ El enlace expiró. Vuelve a "¿Olvidaste tu contraseña?" y solicita uno nuevo.', 'error');
          } else {
            showFormMessage('❌ ' + m, 'error');
          }
          submitBtn.disabled = false;
          submitBtn.textContent = 'Guardar contraseña nueva';
        }
      });
    })();
  </script>
</body>
</html>
